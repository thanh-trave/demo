# .github/workflows/release-guard.yml
# Approach A — blocks the UI merge button on release PRs while keeping it for hotfixes.
# Mark the `guard` job as a REQUIRED status check in main's ruleset.
# Effect:
#   - staging→main / release-*→main PRs: check is red → merge button blocked
#     (the bot bypasses the ruleset, so the Release workflow still lands the ff).
#   - hot-fix-*→main PRs: check is green → normal UI "Squash and merge" works.
#   - anything else→main: red (features must go through staging).
name: release-guard

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, edited]

permissions: {}

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Route by source branch
        env:
          HEAD: ${{ github.head_ref }}
        run: |
          case "$HEAD" in
            staging|release-*)
              echo "::error::Release PRs are merged by the 'Release (staging → main)' workflow, not this button."
              echo "::error::This PR stays open for review/CI and will auto-close as merged when the workflow runs."
              exit 1
              ;;
            hot-fix-*)
              echo "Hotfix PR — UI 'Squash and merge' allowed."
              ;;
            *)
              echo "::error::Only hot-fix-* branches may target main directly. Features go through staging."
              exit 1
              ;;
          esac